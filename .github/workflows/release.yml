name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'           # Trigger otomatis saat push tag seperti v1.0.0
  workflow_dispatch:       # Bisa di-trigger manual dari GitHub UI

permissions:
  contents: write   # Wajib untuk membuat GitHub Release

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout kode
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ─────────────────────────────────────────
      # 2. Setup JDK 17 (sesuai build.gradle.kts)
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─────────────────────────────────────────
      # 3. Inject google-services.json dari Secret
      #    (sama seperti debug workflow)
      # ─────────────────────────────────────────
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # ─────────────────────────────────────────
      # 4. Decode Keystore dari Secret
      #    Keystore di-encode ke Base64 lalu disimpan
      #    sebagai Secret: KEYSTORE_BASE64
      # ─────────────────────────────────────────
      - name: Decode and write Keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/lokashare-release.jks

      # ─────────────────────────────────────────
      # 5. Beri izin eksekusi ke gradlew
      # ─────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ─────────────────────────────────────────
      # 6. Cache Gradle dependencies
      #    (sama persis dengan debug workflow)
      # ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─────────────────────────────────────────
      # 7. Build Release APK (Signed)
      # ─────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ─────────────────────────────────────────
      # 8. Rename APK agar nama file rapi
      # ─────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=${{ github.ref_name }}
          # Fallback jika trigger bukan dari tag
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="manual-build-${{ github.run_number }}"
          fi
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_DST="app/build/outputs/apk/release/LokaShare-${VERSION}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          echo "APK_NAME=LokaShare-${VERSION}.apk" >> $GITHUB_ENV

      # ─────────────────────────────────────────
      # 9. Tampilkan ukuran APK di log
      # ─────────────────────────────────────────
      - name: Show APK size
        run: |
          SIZE=$(du -sh "${{ env.APK_PATH }}" | cut -f1)
          echo "✅ APK Release berhasil: ${{ env.APK_NAME }} ($SIZE)"

      # ─────────────────────────────────────────
      # 10. Upload sebagai artifact (Actions tab)
      #     Berguna jika trigger dari workflow_dispatch
      # ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error

      # ─────────────────────────────────────────
      # 11. Buat GitHub Release & upload APK
      #     Hanya berjalan saat push tag v*.*.*
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "LokaShare ${{ github.ref_name }}"
          body: |
            ## 📦 LokaShare ${{ github.ref_name }}

            ### Cara Install
            1. Download file `LokaShare-${{ github.ref_name }}.apk` di bawah
            2. Di Android, aktifkan **Sumber tidak dikenal** (Settings → Security)
            3. Buka file APK dan install

            ### Minimum Requirement
            - Android 7.0 (API 24) ke atas
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
