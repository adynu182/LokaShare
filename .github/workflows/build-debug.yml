name: Build APK Debug

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch: # Bisa di-trigger manual dari GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout kode
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Setup JDK 17 (sesuai build.gradle.kts)
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─────────────────────────────────────────
      # 3. Inject google-services.json dari Secret
      #    (agar API key tidak masuk repo publik)
      # ─────────────────────────────────────────
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
        # CATATAN: Tambahkan Secret di GitHub:
        # Repo → Settings → Secrets and variables → Actions
        # Nama secret: GOOGLE_SERVICES_JSON
        # Isi: copy-paste seluruh isi file google-services.json

      # ─────────────────────────────────────────
      # 4. Beri izin eksekusi ke gradlew
      # ─────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ─────────────────────────────────────────
      # 5. Cache Gradle dependencies
      #    (mempercepat build berikutnya)
      # ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─────────────────────────────────────────
      # 6. Build APK Debug
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      # ─────────────────────────────────────────
      # 7. Upload APK sebagai artifact
      #    (bisa didownload dari tab Actions)
      # ─────────────────────────────────────────
      - name: Upload APK Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: LokaShare-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      # ─────────────────────────────────────────
      # 8. (Opsional) Tampilkan ukuran APK di log
      # ─────────────────────────────────────────
      - name: Show APK size
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "✅ APK Debug berhasil dibuild: $APK ($SIZE)"
